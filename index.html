<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de alistamento</title>
    
</head>

<body>
    <h1>Sistema de alistamento para missão espacial civil</h1>
    <form action="https:google.com/api"
       enctype="multipart/form-data" 
       method="post">
       <button type="reset">Limpar formulário</button>
       <br><br>

       <fieldset>
        <legend>Informações gerais:</legend>
        <label for="nome_completo">Nome Completo:</label>
        <input type="text" name="nome_completo" id="nome"
        placeholder="Seu nome completo..." required minlength="5">
        <br>

        <label for="email">Email:</label>
        <input type="email" name="email_usuario" id="email"
        placeholder="seuemail@email.com" required>
        <br>

        <label for="idade">Idade:</label>
        <input type="number" name="idade" id="idade"
        placeholder="Digite sua idade..."
        minlength="18" maxlength="65">
        <br>

        <label for="telefone">Telefone:</label>
        <input type="number" name="telefone" id="telefone"
        placeholder="(xx) xxxx-xxxx" required>
       </fieldset>
       <br>

       <fieldset>
            <legend>Dados do usuário</legend>
            <label for="login_usuario">Login:</label>
            <input type="text" name="login_usuario" id="usuario" placeholder="Digite seu login..." required minlength="8" maxlength="15">
            <br>
 
            <label for="senha_usuario">Senha:</label>
            <input type="password" name="senha_usuario" id="senha" placeholder="Digite sua senha..">
        </fieldset>
        <br>

        <fieldset>
            <legend>Especialidade</legend>
            <input type="radio" name="especialidade" id="engenharia" value="engenharia">
            <label for="engenharia">Engenharia</label>
            <br>

            <input type="radio" name="especialidade" id="botanica" value="engenharia">
            <label for="botanica">Botânica</label>
            <br>

            <input type="radio" name="especialidade" id="saude" value="engenharia">
            <label for="saude">Saúde</label>

        </fieldset>
        <br>

        <fieldset>
            <legend>Treinamentos</legend>
            <input type="checkbox" name="treinamentos" id="mergulho" value="mergulho">
            <label for="mergulho">Mergulho</label>
            <br>

            <input type="checkbox" name="treinamentos" id="pilotagem" value="pilotagem">
            <label for="pilotagem">Pilotagem</label>
            <br>

            <input type="checkbox" name="treinamentos" id="sobrevivencia" value="sobrevivencia">
            <label for="sobrevivencia">Sobrevivência</label>
            <br>
        </fieldset>
        <br>

            <label for="justificativa">Por que você deve ir à Lua?</label>
            <br>
            <textarea id="justificativa" rows="10" cols="30"></textarea>
            <br><br>

            <input type="checkbox" name="termo" id="termo_uso" value="termo_uso" required>
            <label for="termo_uso">Aceito termos de risco</label>
            <br><br>

            <button type="submit">Enviar formulário</button>
    </form>
</body>
</html>
